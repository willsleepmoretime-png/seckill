<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>活动管理 — SeckillPro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #FFF8F0;
      --card-bg:  #FFFFFF;
      --text:     #3D2E1F;
      --muted:    #9B8573;
      --coral:    #FF6B5B;
      --coral-dim:rgba(255,107,91,0.1);
      --gold:     #D4914A;
      --gold-light:#E8A850;
      --gold-dim: rgba(212,145,74,0.1);
      --gold-glow:rgba(212,145,74,0.2);
      --green:    #6BA587;
      --green-dim:rgba(107,165,135,0.08);
      --rose:     #E8A090;
      --rose-dim: rgba(232,160,144,0.12);
      --red:      #E04545;
      --red-dim:  rgba(224,69,69,0.08);
      --surface:  rgba(0,0,0,0.02);
      --border:   rgba(0,0,0,0.06);
      --border-h: rgba(0,0,0,0.12);
      --input-bg: rgba(0,0,0,0.02);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }

    .bg-base {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(255,180,130,0.10) 0%, transparent 50%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(255,150,100,0.08) 0%, transparent 50%);
    }

    /* ── Nav ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,248,240,0.88); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      height: 60px; display: flex; align-items: center; padding: 0 36px; gap: 16px;
    }
    .nav-brand {
      font-size: 1rem; font-weight: 700; letter-spacing: 1.2px;
      color: var(--gold); display: flex; align-items: center; gap: 8px; cursor: pointer;
    }
    .nav-brand .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--coral); box-shadow: 0 0 8px rgba(255,107,91,0.3); animation: breathe 2.5s ease-in-out infinite; }
    @keyframes breathe { 0%,100% { box-shadow: 0 0 6px rgba(255,107,91,0.3); } 50% { box-shadow: 0 0 16px rgba(255,107,91,0.55); } }
    .nav-links { display: flex; gap: 2px; margin-left: 24px; }
    .nav-link {
      padding: 6px 14px; border-radius: 7px; font-size: 0.84rem; font-weight: 500;
      color: var(--muted); cursor: pointer; background: none; border: none; font-family: inherit;
      transition: all 0.2s;
    }
    .nav-link:hover { color: var(--text); background: rgba(0,0,0,0.03); }
    .nav-link.on { color: var(--coral); background: var(--coral-dim); }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
    .nav-back { font-size: 0.84rem; color: var(--muted); cursor: pointer; transition: color 0.2s; }
    .nav-back:hover { color: var(--coral); }

    /* ── Main ── */
    .main { position: relative; z-index: 1; padding: 0 36px 80px; max-width: 1000px; margin: 0 auto; }

    .page-title {
      margin: 32px 0 24px; font-size: 1.4rem; font-weight: 700;
      display: flex; align-items: center; gap: 10px;
    }
    .page-title span { color: var(--coral); }

    /* ── 两栏布局 ── */
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

    @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }

    .panel {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px;
      padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .panel h3 {
      font-size: 0.95rem; font-weight: 700; margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px; color: var(--text);
    }
    .panel h3::before { content: ''; width: 3px; height: 16px; border-radius: 2px; background: var(--coral); }

    /* ── Form ── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 0.76rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%; padding: 11px 13px; border-radius: 9px;
      background: var(--input-bg); border: 1px solid var(--border);
      color: var(--text); font-size: 0.9rem; font-family: inherit; outline: none;
      transition: all 0.2s;
    }
    .field input:focus, .field select:focus {
      border-color: var(--coral); box-shadow: 0 0 0 3px var(--coral-dim), 0 0 12px var(--coral-dim);
    }
    .field select { cursor: pointer; }
    .field select option { background: #fff; color: var(--text); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn {
      width: 100%; padding: 12px; border-radius: 10px; font-size: 0.92rem; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: all 0.2s; border: none; margin-top: 6px;
    }
    .btn-primary {
      background: linear-gradient(135deg, rgba(255,107,91,0.15), rgba(255,142,83,0.08));
      border: 1px solid rgba(255,107,91,0.3); color: var(--coral);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(255,107,91,0.25), rgba(255,142,83,0.16));
      border-color: var(--coral); box-shadow: 0 0 20px rgba(255,107,91,0.15);
    }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary:disabled:hover { box-shadow: none; border-color: rgba(255,107,91,0.3); }

    /* ── 活动列表 ── */
    .sk-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0; border-bottom: 1px solid var(--border); gap: 12px;
    }
    .sk-item:last-child { border-bottom: none; }
    .sk-info { flex: 1; min-width: 0; }
    .sk-name { font-size: 0.88rem; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
    .sk-meta { font-size: 0.74rem; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }
    .sk-price { font-weight: 700; color: var(--coral); }
    .sk-status {
      font-size: 0.7rem; font-weight: 700; padding: 3px 9px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
    }
    .sk-status.live { background: var(--coral-dim); color: var(--coral); }
    .sk-status.soon { background: var(--gold-dim); color: var(--gold); }
    .sk-status.end  { background: rgba(0,0,0,0.03); color: var(--muted); }

    .empty-list { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-list .icon { font-size: 2.2rem; opacity: 0.2; margin-bottom: 10px; }

    /* ── Alert ── */
    .alert {
      display: none; align-items: center; gap: 8px; padding: 10px 14px;
      border-radius: 9px; font-size: 0.83rem; font-weight: 500; margin-bottom: 16px;
    }
    .alert.err { display: flex; background: var(--red-dim); border: 1px solid rgba(224,69,69,0.2); color: var(--red); }
    .alert.ok  { display: flex; background: var(--green-dim); border: 1px solid rgba(107,165,135,0.2); color: #4A9070; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,107,91,0.2); border-top-color: var(--coral);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) { .nav { padding: 0 16px; } .main { padding: 0 16px 60px; } }
  </style>
</head>
<body>

<div class="bg-base"></div>

<nav class="nav">
  <div class="nav-brand" onclick="window.location.href='home.html'"><span class="dot"></span>SeckillPro</div>
  <div class="nav-links">
    <button class="nav-link" onclick="window.location.href='home.html'">秒杀大厅</button>
    <button class="nav-link on">活动管理</button>
    <button class="nav-link" onclick="window.location.href='cache-stats.html'">缓存监控</button>
    <button class="nav-link" onclick="window.location.href='orders.html'">我的订单</button>
    <button class="nav-link" onclick="window.location.href='user.html'">个人中心</button>
  </div>
  <div class="nav-right">
    <span class="nav-back" onclick="window.location.href='home.html'">← 返回大厅</span>
  </div>
</nav>

<div class="main">
  <h1 class="page-title">⚡ <span>活动管理</span></h1>

  <div class="layout">
    <!-- 左侧：创建表单 -->
    <div class="panel">
      <h3>新建秒杀活动</h3>
      <div class="alert" id="alert"><span id="alertMsg"></span></div>
      <form id="createForm" onsubmit="return false;">
        <div class="field">
          <label for="goodsId">选择商品</label>
          <select id="goodsId" required>
            <option value="">-- 请选择商品 --</option>
          </select>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="seckillPrice">秒杀价 (¥)</label>
            <input type="number" id="seckillPrice" step="0.01" min="0.01" placeholder="0.00" required />
          </div>
          <div class="field">
            <label for="stockCount">秒杀库存</label>
            <input type="number" id="stockCount" min="1" placeholder="件数" required />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="startTime">开始时间</label>
            <input type="datetime-local" id="startTime" required />
          </div>
          <div class="field">
            <label for="endTime">结束时间</label>
            <input type="datetime-local" id="endTime" required />
          </div>
        </div>
        <button class="btn btn-primary" id="submitBtn" onclick="doCreate()">创建活动</button>
      </form>
    </div>

    <!-- 右侧：活动列表 -->
    <div class="panel">
      <h3>进行中的活动</h3>
      <div id="seckillList"></div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8028';

/* ── 登录检查 ── */
if (!JSON.parse(sessionStorage.getItem('userInfo') || 'null')) window.location.href = 'index.html';

/* ── 加载商品下拉 ── */
async function loadGoodsOptions() {
  const sel = document.getElementById('goodsId');
  try {
    const userInfo = JSON.parse(sessionStorage.getItem('userInfo') || 'null');
    const res = await fetch(`${API}/api/goods/list?order=asc`, {
      headers: { 'Authorization': userInfo?.token || '' }
    });
    const data = await res.json();
    if (data.code === '00000' && data.data) {
      data.data.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g.id;
        opt.textContent = `${g.name} — ¥${(g.price || 0).toLocaleString()} (库存 ${g.stock || 0})`;
        sel.appendChild(opt);
      });
    }
  } catch (e) { /* ignore */ }
}

/* ── 加载进行中的活动 ── */
async function loadSeckillList() {
  const list = document.getElementById('seckillList');
  list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted)"><span class="spinner"></span>加载中...</div>';
  try {
    const userInfo = JSON.parse(sessionStorage.getItem('userInfo') || 'null');
    const token = userInfo?.token || '';
    const [skRes, goodsRes] = await Promise.all([
      fetch(`${API}/api/seckill/list/in-progress`, { headers: { 'Authorization': token } }),
      fetch(`${API}/api/goods/list?order=asc`, { headers: { 'Authorization': token } })
    ]);
    const skData = await skRes.json();
    const goodsData = await goodsRes.json();
    const goodsMap = {};
    if (goodsData.code === '00000' && goodsData.data) {
      goodsData.data.forEach(g => { goodsMap[g.id] = g; });
    }

    if (skData.code !== '00000' || !skData.data || skData.data.length === 0) {
      list.innerHTML = '<div class="empty-list"><div class="icon">◆</div><p>暂无进行中的活动</p></div>';
      return;
    }

    list.innerHTML = '';
    skData.data.forEach(sk => {
      const g = goodsMap[sk.goodsId] || {};
      const st = sk.startTime ? new Date(sk.startTime).toLocaleString('zh-CN') : '-';
      const et = sk.endTime ? new Date(sk.endTime).toLocaleString('zh-CN') : '-';
      const div = document.createElement('div'); div.className = 'sk-item';
      div.innerHTML = `
        <div class="sk-info">
          <div class="sk-name">${g.name || '商品 #' + sk.goodsId}</div>
          <div class="sk-meta">
            <span class="sk-price">¥${(sk.seckillPrice || 0).toLocaleString()}</span>
            <span>库存 ${sk.stockCount || 0}</span>
            <span>${st} → ${et}</span>
          </div>
        </div>
        <span class="sk-status live">进行中</span>
      `;
      list.appendChild(div);
    });
  } catch (e) {
    list.innerHTML = '<div class="empty-list"><div class="icon">◆</div><p>加载失败</p></div>';
  }
}

/* ── 创建活动 ── */
function alert(msg, type) {
  const el = document.getElementById('alert');
  document.getElementById('alertMsg').textContent = msg;
  el.className = 'alert ' + type;
}

function hideAlert() { document.getElementById('alert').className = 'alert'; }

async function doCreate() {
  hideAlert();
  const userInfo = JSON.parse(sessionStorage.getItem('userInfo') || 'null');
  const goodsId = document.getElementById('goodsId').value;
  const seckillPrice = document.getElementById('seckillPrice').value;
  const stockCount = document.getElementById('stockCount').value;
  const startTime = document.getElementById('startTime').value;
  const endTime = document.getElementById('endTime').value;

  if (!goodsId || !seckillPrice || !stockCount || !startTime || !endTime) {
    alert('请填写所有字段', 'err'); return;
  }
  if (parseFloat(seckillPrice) <= 0 || parseInt(stockCount) <= 0) {
    alert('价格和库存必须大于 0', 'err'); return;
  }
  if (new Date(startTime) >= new Date(endTime)) {
    alert('结束时间必须晚于开始时间', 'err'); return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>创建中...';

  try {
    const res = await fetch(`${API}/api/seckill`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': userInfo?.token || '' },
      body: JSON.stringify({
        goodsId: parseInt(goodsId),
        seckillPrice: parseFloat(seckillPrice),
        stockCount: parseInt(stockCount),
        startTime: startTime + ':00',
        endTime: endTime + ':00'
      })
    });
    const data = await res.json();
    if (data.code === '00000') {
      alert('秒杀活动创建成功！', 'ok');
      document.getElementById('createForm').reset();
      loadSeckillList();
    } else {
      alert(data.msg || '创建失败，请检查参数', 'err');
    }
  } catch (e) {
    alert('网络异常，请稍后重试', 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '创建活动';
  }
}

/* ── Init ── */
loadGoodsOptions();
loadSeckillList();
</script>
</body>
</html>
