<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>缓存监控 — SeckillPro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #FFF8F0;
      --card-bg:   #FFFFFF;
      --text:      #3D2E1F;
      --muted:     #9B8573;
      --coral:     #FF6B5B;
      --coral-dim: rgba(255,107,91,0.1);
      --gold:      #D4914A;
      --gold-dim:  rgba(212,145,74,0.1);
      --green:     #5CA890;
      --green-dim: rgba(92,168,144,0.1);
      --red:       #E04545;
      --red-dim:   rgba(224,69,69,0.08);
      --surface:   rgba(0,0,0,0.02);
      --border:    rgba(0,0,0,0.06);
      --border-h:  rgba(0,0,0,0.12);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .bg-base {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(255,180,130,0.10) 0%, transparent 50%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(255,150,100,0.08) 0%, transparent 50%);
    }

    #cursor-warm {
      position: fixed;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,150,100,0.06) 0%, rgba(255,180,140,0.02) 40%, transparent 65%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: left 0.15s ease, top 0.15s ease;
      z-index: 1;
    }

    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,248,240,0.88);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      height: 60px; display: flex; align-items: center; padding: 0 36px; gap: 16px;
    }
    .nav-brand {
      font-size: 1rem; font-weight: 700; letter-spacing: 1.2px;
      color: var(--gold); display: flex; align-items: center; gap: 8px; cursor: pointer;
    }
    .nav-brand .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--coral); box-shadow: 0 0 8px rgba(255,107,91,0.3);
      animation: breathe 2.5s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 6px rgba(255,107,91,0.3); }
      50% { box-shadow: 0 0 16px rgba(255,107,91,0.55); }
    }
    .nav-links { display: flex; gap: 2px; margin-left: 24px; }
    .nav-link {
      padding: 6px 14px; border-radius: 7px; font-size: 0.84rem; font-weight: 500;
      color: var(--muted); cursor: pointer; transition: all 0.2s;
      background: none; border: none; font-family: inherit; text-decoration: none;
      display: inline-flex; align-items: center; white-space: nowrap;
    }
    .nav-link:hover { color: var(--text); background: rgba(0,0,0,0.03); }
    .nav-link.on { color: var(--coral); background: var(--coral-dim); }

    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
    .nav-user {
      display: flex; align-items: center; gap: 8px; padding: 4px 12px 4px 5px;
      border-radius: 10px; background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s; position: relative;
    }
    .nav-user:hover { border-color: var(--border-h); background: rgba(0,0,0,0.03); }
    .nav-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--coral), #e55a4a);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 700; color: #fff;
    }
    .nav-name { font-size: 0.84rem; font-weight: 500; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dropdown {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 4px; min-width: 150px; display: none; z-index: 200;
      box-shadow: 0 16px 40px rgba(0,0,0,0.1);
    }
    .dropdown.show { display: block; animation: fadeIn 0.15s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .dropdown a {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 6px;
      font-size: 0.83rem; color: var(--muted); cursor: pointer; text-decoration: none;
      transition: all 0.15s;
    }
    .dropdown a:hover { background: var(--coral-dim); color: var(--coral); }
    .dropdown a.quit:hover { background: var(--red-dim); color: var(--red); }

    .main { position: relative; z-index: 1; padding: 0 36px 80px; max-width: 1180px; margin: 0 auto; }
    .page-head {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 18px; margin: 34px 0 22px;
    }
    .page-title {
      font-size: 1.4rem; font-weight: 700;
      display: flex; align-items: center; gap: 10px;
    }
    .page-title .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--coral); box-shadow: 0 0 10px rgba(255,107,91,0.25);
    }
    .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .updated { font-size: 0.78rem; color: var(--muted); font-variant-numeric: tabular-nums; }

    .btn {
      height: 34px; padding: 0 14px; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
      border: 1px solid rgba(255,107,91,0.3); color: var(--coral);
      background: linear-gradient(135deg, rgba(255,107,91,0.15), rgba(255,142,83,0.08));
      cursor: pointer; font-family: inherit; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 7px;
    }
    .btn:hover { border-color: var(--coral); box-shadow: 0 0 14px rgba(255,107,91,0.15); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; box-shadow: none; }
    .switch {
      display: inline-flex; align-items: center; gap: 8px; color: var(--muted);
      font-size: 0.82rem; cursor: pointer; user-select: none;
    }
    .switch input { display: none; }
    .switch-track {
      width: 38px; height: 22px; border-radius: 999px; border: 1px solid var(--border-h);
      background: rgba(0,0,0,0.04); position: relative; transition: all 0.2s;
    }
    .switch-track::after {
      content: ''; position: absolute; width: 16px; height: 16px; border-radius: 50%;
      left: 3px; top: 2px; background: #fff; box-shadow: 0 2px 7px rgba(0,0,0,0.16);
      transition: transform 0.2s;
    }
    .switch input:checked + .switch-track { background: var(--green-dim); border-color: rgba(92,168,144,0.35); }
    .switch input:checked + .switch-track::after { transform: translateX(16px); background: var(--green); }

    .stats-grid {
      display: grid; grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px; margin-bottom: 16px;
    }
    .metric-card, .panel {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .metric-card { padding: 20px; min-height: 128px; }
    .metric-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .metric-label { font-size: 0.76rem; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; }
    .metric-pill {
      font-size: 0.7rem; font-weight: 700; padding: 3px 8px; border-radius: 999px;
      background: var(--surface); color: var(--muted); border: 1px solid var(--border);
    }
    .metric-pill.good { color: var(--green); background: var(--green-dim); border-color: rgba(92,168,144,0.22); }
    .metric-pill.warn { color: var(--gold); background: var(--gold-dim); border-color: rgba(212,145,74,0.22); }
    .metric-value { font-size: 2rem; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }
    .metric-sub { margin-top: 12px; font-size: 0.78rem; color: var(--muted); }

    .layout { display: grid; grid-template-columns: 1.35fr 0.9fr; gap: 16px; align-items: start; }
    .panel { padding: 22px; }
    .panel h3 {
      font-size: 0.95rem; margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
    }
    .panel h3::before { content: ''; width: 3px; height: 16px; border-radius: 2px; background: var(--coral); }
    .hit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .chart-block { min-width: 0; }
    .chart-title { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 12px; font-size: 0.84rem; font-weight: 700; }
    .chart-rate { color: var(--coral); font-variant-numeric: tabular-nums; }
    .bar-row { margin-bottom: 14px; }
    .bar-meta { display: flex; justify-content: space-between; font-size: 0.76rem; color: var(--muted); margin-bottom: 6px; }
    .bar-track { height: 12px; border-radius: 999px; background: rgba(0,0,0,0.04); overflow: hidden; border: 1px solid var(--border); }
    .bar-fill { height: 100%; border-radius: 999px; min-width: 0; transition: width 0.35s ease; }
    .bar-fill.hit { background: linear-gradient(90deg, var(--green), #7BBE9E); }
    .bar-fill.miss { background: linear-gradient(90deg, var(--coral), #F09076); }

    .message-panel { display: grid; gap: 12px; }
    .message-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .message-row:last-child { border-bottom: none; }
    .message-label { font-size: 0.82rem; color: var(--muted); }
    .message-value { font-size: 1.15rem; font-weight: 800; font-variant-numeric: tabular-nums; }
    .health {
      margin-top: 4px; padding: 12px 14px; border-radius: 10px;
      font-size: 0.82rem; line-height: 1.6; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted);
    }
    .health.ok { background: var(--green-dim); color: #467E6B; border-color: rgba(92,168,144,0.22); }
    .health.warn { background: var(--gold-dim); color: var(--gold); border-color: rgba(212,145,74,0.22); }

    .detail-panel { margin-top: 16px; }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    .detail-table th {
      text-align: left; color: var(--muted); font-size: 0.72rem; letter-spacing: 0.6px;
      text-transform: uppercase; padding: 0 10px 10px;
    }
    .detail-table td {
      padding: 12px 10px; border-top: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
    }
    .detail-table td:last-child { font-weight: 700; color: var(--coral); }

    .state {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px;
      padding: 42px 20px; text-align: center; color: var(--muted);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .state h3 { color: var(--text); font-size: 1rem; margin-bottom: 6px; }
    .spinner {
      display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,107,91,0.2);
      border-top-color: var(--coral); border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .foot {
      border-top: 1px solid var(--border); padding: 22px 36px;
      display: flex; justify-content: space-between; color: var(--muted); font-size: 0.78rem;
      position: relative; z-index: 1;
    }

    @media (max-width: 980px) {
      .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 700px) {
      .nav { padding: 0 16px; }
      .nav-links { gap: 0; margin-left: 4px; overflow-x: auto; }
      .nav-link { padding: 6px 8px; font-size: 0.76rem; }
      .nav-name { display: none; }
      .main { padding: 0 16px 60px; }
      .page-head { align-items: flex-start; flex-direction: column; }
      .toolbar { justify-content: flex-start; }
      .stats-grid, .hit-grid { grid-template-columns: 1fr; }
      .detail-table th:nth-child(1), .detail-table td:nth-child(1) { display: none; }
      .foot { flex-direction: column; gap: 6px; }
    }
  </style>
</head>
<body>

<div class="bg-base"></div>
<div id="cursor-warm"></div>

<nav class="nav">
  <div class="nav-brand" onclick="window.location.href='home.html'"><span class="dot"></span>SeckillPro</div>
  <div class="nav-links">
    <a class="nav-link" href="home.html">秒杀大厅</a>
    <a class="nav-link" href="admin.html">活动管理</a>
    <a class="nav-link on">缓存监控</a>
    <a class="nav-link" href="orders.html">我的订单</a>
    <a class="nav-link" href="user.html">个人中心</a>
  </div>
  <div class="nav-right">
    <div class="nav-user" id="navUser" onclick="toggleDropdown()">
      <div class="nav-avatar" id="navAvatar">U</div>
      <span class="nav-name" id="navName">用户</span>
      <div class="dropdown" id="dropdown">
        <a href="orders.html">我的订单</a>
        <a href="user.html">个人中心</a>
        <a onclick="logout()" class="quit">退出登录</a>
      </div>
    </div>
  </div>
</nav>

<main class="main">
  <div class="page-head">
    <div>
      <div class="page-title"><span class="dot"></span>缓存监控</div>
    </div>
    <div class="toolbar">
      <span class="updated" id="updatedAt">最后更新 —</span>
      <label class="switch">
        <input type="checkbox" id="autoRefresh" checked />
        <span class="switch-track"></span>
        自动刷新
      </label>
      <button class="btn" id="refreshBtn" onclick="loadStats(true)">刷新</button>
    </div>
  </div>

  <div id="content">
    <div class="state"><span class="spinner"></span><p style="margin-top:10px;">正在读取缓存统计...</p></div>
  </div>
</main>

<footer class="foot">
  <span>&copy; 2026 SeckillPro</span>
  <span>仅供学习演示</span>
</footer>

<script>
const API = 'http://localhost:8028';
const userInfo = JSON.parse(sessionStorage.getItem('userInfo') || 'null');
if (!userInfo) window.location.href = 'index.html';

(function initUser() {
  if (!userInfo) return;
  const name = userInfo.nickname || userInfo.phone || '用户';
  document.getElementById('navName').textContent = name;
  document.getElementById('navAvatar').textContent = name.charAt(0).toUpperCase();
})();

const glow = document.getElementById('cursor-warm');
document.addEventListener('mousemove', e => {
  glow.style.left = e.clientX + 'px';
  glow.style.top = e.clientY + 'px';
});

function toggleDropdown() {
  document.getElementById('dropdown').classList.toggle('show');
}
document.addEventListener('click', e => {
  if (!document.getElementById('navUser').contains(e.target)) {
    document.getElementById('dropdown').classList.remove('show');
  }
});
function logout() {
  sessionStorage.removeItem('userInfo');
  window.location.href = 'index.html';
}

const labels = [
  ['bloomReject', 'Bloom 拦截', '布隆过滤器直接拒绝的请求数'],
  ['caffeineHit', 'Caffeine 命中', '本地缓存命中次数'],
  ['caffeineMiss', 'Caffeine 未命中', '本地缓存未命中次数'],
  ['caffeineHitRate', 'Caffeine 命中率', '本地缓存命中占比'],
  ['caffeineEviction', 'Caffeine 淘汰', '本地缓存淘汰条目数'],
  ['redisHit', 'Redis 命中', 'Redis 缓存命中次数'],
  ['redisMiss', 'Redis 未命中', 'Redis 缓存未命中次数'],
  ['redisHitRate', 'Redis 命中率', 'Redis 命中占比'],
  ['dbQuery', 'DB 查询', '缓存未命中后查询数据库次数'],
  ['cacheInvalidationPublished', '失效消息发布', '已发布的缓存失效消息数'],
  ['cacheInvalidationReceived', '失效消息接收', '已接收的缓存失效消息数']
];

let refreshTimer = null;
let firstLoad = true;

function num(v) {
  return Number(v || 0);
}
function fmtInt(v) {
  return num(v).toLocaleString();
}
function fmtRate(v) {
  return (num(v) * 100).toFixed(2) + '%';
}
function pct(part, total) {
  return total <= 0 ? 0 : Math.round((part / total) * 100);
}
function escHtml(s) {
  const el = document.createElement('span');
  el.textContent = s == null ? '' : String(s);
  return el.innerHTML;
}
function ratePill(rate) {
  if (rate >= 0.8) return '<span class="metric-pill good">良好</span>';
  if (rate >= 0.5) return '<span class="metric-pill warn">观察</span>';
  return '<span class="metric-pill">偏低</span>';
}

function renderStats(stats) {
  const caffeineTotal = num(stats.caffeineHit) + num(stats.caffeineMiss);
  const redisTotal = num(stats.redisHit) + num(stats.redisMiss);
  const published = num(stats.cacheInvalidationPublished);
  const received = num(stats.cacheInvalidationReceived);
  const diff = published - received;
  let healthClass = 'ok';
  let healthText = '失效消息发布与接收一致，当前节点消息链路正常。';
  if (diff > 0) {
    healthClass = 'warn';
    healthText = `发布数比接收数多 ${fmtInt(diff)} 条，可能存在其他节点未消费、消费延迟，或当前节点只负责发布。`;
  } else if (diff < 0) {
    healthClass = 'ok';
    healthText = `接收数比发布数多 ${fmtInt(Math.abs(diff))} 条，说明当前节点接收了其他节点发布的失效消息。`;
  }

  document.getElementById('content').innerHTML = `
    <section class="stats-grid">
      <div class="metric-card">
        <div class="metric-top"><span class="metric-label">Caffeine 命中率</span>${ratePill(num(stats.caffeineHitRate))}</div>
        <div class="metric-value">${fmtRate(stats.caffeineHitRate)}</div>
        <div class="metric-sub">${fmtInt(stats.caffeineHit)} 命中 / ${fmtInt(caffeineTotal)} 总访问</div>
      </div>
      <div class="metric-card">
        <div class="metric-top"><span class="metric-label">Redis 命中率</span>${ratePill(num(stats.redisHitRate))}</div>
        <div class="metric-value">${fmtRate(stats.redisHitRate)}</div>
        <div class="metric-sub">${fmtInt(stats.redisHit)} 命中 / ${fmtInt(redisTotal)} 总访问</div>
      </div>
      <div class="metric-card">
        <div class="metric-top"><span class="metric-label">Bloom 拦截</span><span class="metric-pill good">防穿透</span></div>
        <div class="metric-value">${fmtInt(stats.bloomReject)}</div>
        <div class="metric-sub">无效请求被提前拒绝</div>
      </div>
      <div class="metric-card">
        <div class="metric-top"><span class="metric-label">DB 查询</span><span class="metric-pill warn">回源</span></div>
        <div class="metric-value">${fmtInt(stats.dbQuery)}</div>
        <div class="metric-sub">缓存未命中后的数据库查询</div>
      </div>
    </section>

    <section class="layout">
      <div class="panel">
        <h3>命中与未命中对比</h3>
        <div class="hit-grid">
          ${renderHitBlock('Caffeine 本地缓存', stats.caffeineHit, stats.caffeineMiss, stats.caffeineHitRate)}
          ${renderHitBlock('Redis 分布式缓存', stats.redisHit, stats.redisMiss, stats.redisHitRate)}
        </div>
      </div>
      <div class="panel">
        <h3>缓存失效消息</h3>
        <div class="message-panel">
          <div class="message-row"><span class="message-label">已发布</span><span class="message-value">${fmtInt(published)}</span></div>
          <div class="message-row"><span class="message-label">已接收</span><span class="message-value">${fmtInt(received)}</span></div>
          <div class="health ${healthClass}">${healthText}</div>
        </div>
      </div>
    </section>

    <section class="panel detail-panel">
      <h3>统计明细</h3>
      <table class="detail-table">
        <thead><tr><th>字段</th><th>含义</th><th>当前值</th></tr></thead>
        <tbody>
          ${labels.map(([key, label, desc]) => `
            <tr>
              <td>${key}</td>
              <td>${label}<span style="color:var(--muted);"> · ${desc}</span></td>
              <td>${key.endsWith('Rate') ? fmtRate(stats[key]) : fmtInt(stats[key])}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </section>
  `;
}

function renderHitBlock(title, hit, miss, rate) {
  const hitCount = num(hit);
  const missCount = num(miss);
  const total = hitCount + missCount;
  return `
    <div class="chart-block">
      <div class="chart-title"><span>${title}</span><span class="chart-rate">${fmtRate(rate)}</span></div>
      <div class="bar-row">
        <div class="bar-meta"><span>命中</span><span>${fmtInt(hitCount)}</span></div>
        <div class="bar-track"><div class="bar-fill hit" style="width:${pct(hitCount, total)}%"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-meta"><span>未命中</span><span>${fmtInt(missCount)}</span></div>
        <div class="bar-track"><div class="bar-fill miss" style="width:${pct(missCount, total)}%"></div></div>
      </div>
    </div>
  `;
}

function showError(title, msg) {
  document.getElementById('content').innerHTML = `
    <div class="state">
      <h3>${escHtml(title)}</h3>
      <p>${escHtml(msg)}</p>
      <button class="btn" style="margin-top:18px;" onclick="loadStats(true)">重新加载</button>
    </div>
  `;
}

async function loadStats(manual) {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>刷新中';
  if (firstLoad) {
    document.getElementById('content').innerHTML = '<div class="state"><span class="spinner"></span><p style="margin-top:10px;">正在读取缓存统计...</p></div>';
  }

  try {
    const res = await fetch(`${API}/api/cache/stats`, {
      headers: { 'Authorization': userInfo?.token || '' }
    });
    const result = await res.json();
    if (result.code === '00000' && result.data) {
      renderStats(result.data);
      document.getElementById('updatedAt').textContent = '最后更新 ' + new Date().toLocaleTimeString('zh-CN');
      firstLoad = false;
    } else if (result.code === 'A00002') {
      sessionStorage.removeItem('userInfo');
      window.location.href = 'index.html';
    } else {
      showError('加载失败', result.msg || '请稍后重试');
      firstLoad = false;
    }
  } catch (e) {
    showError('网络异常', '请检查后端服务是否启动');
    firstLoad = false;
  } finally {
    btn.disabled = false;
    btn.innerHTML = manual ? '刷新' : '刷新';
  }
}

function resetAutoRefresh() {
  clearInterval(refreshTimer);
  if (document.getElementById('autoRefresh').checked) {
    refreshTimer = setInterval(() => {
      if (!document.hidden) loadStats(false);
    }, 5000);
  }
}

document.getElementById('autoRefresh').addEventListener('change', resetAutoRefresh);
document.addEventListener('visibilitychange', resetAutoRefresh);

loadStats(false);
resetAutoRefresh();
</script>
</body>
</html>
