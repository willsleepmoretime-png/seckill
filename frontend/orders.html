<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的订单 — SeckillPro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #FFF8F0;
      --card-bg:   #FFFFFF;
      --text:      #3D2E1F;
      --muted:     #9B8573;
      --coral:     #FF6B5B;
      --coral-dim: rgba(255,107,91,0.1);
      --gold:      #D4914A;
      --gold-light:#E8A850;
      --gold-dim:  rgba(212,145,74,0.1);
      --gold-glow: rgba(212,145,74,0.15);
      --green:     #5CA890;
      --red:       #E04545;
      --amber:     #D4914A;
      --surface:   rgba(0,0,0,0.02);
      --border:    rgba(0,0,0,0.06);
      --border-h:  rgba(0,0,0,0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .bg-base {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(255,180,130,0.10) 0%, transparent 50%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(255,150,100,0.08) 0%, transparent 50%);
    }

    #cursor-warm {
      position: fixed;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,150,100,0.06) 0%, rgba(255,180,140,0.02) 40%, transparent 65%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: left 0.15s ease, top 0.15s ease;
      z-index: 1;
    }

    /* Nav */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,248,240,0.88);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      height: 60px; display: flex; align-items: center; padding: 0 36px; gap: 16px;
    }

    .nav-brand {
      font-size: 1rem; font-weight: 700; letter-spacing: 1.2px;
      color: var(--gold); display: flex; align-items: center; gap: 8px; cursor: pointer;
    }
    .nav-brand .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--coral); box-shadow: 0 0 8px rgba(255,107,91,0.3);
      animation: breathe 2.5s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 6px rgba(255,107,91,0.3); }
      50% { box-shadow: 0 0 16px rgba(255,107,91,0.55); }
    }

    .nav-links { display: flex; gap: 2px; margin-left: 24px; }
    .nav-link {
      padding: 6px 14px; border-radius: 7px; font-size: 0.84rem; font-weight: 500;
      color: var(--muted); cursor: pointer; transition: all 0.2s;
      background: none; border: none; font-family: inherit; text-decoration: none;
      display: inline-flex; align-items: center;
    }
    .nav-link:hover { color: var(--text); background: rgba(0,0,0,0.03); }
    .nav-link.on { color: var(--coral); background: var(--coral-dim); }

    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }

    .nav-user {
      display: flex; align-items: center; gap: 8px; padding: 4px 12px 4px 5px;
      border-radius: 10px; background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s; position: relative;
    }
    .nav-user:hover { border-color: var(--border-h); background: rgba(0,0,0,0.03); }
    .nav-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--coral), #e55a4a);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 700; color: #fff;
    }
    .nav-name { font-size: 0.84rem; font-weight: 500; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .dropdown {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 4px; min-width: 140px; display: none; z-index: 200;
      box-shadow: 0 16px 40px rgba(0,0,0,0.1);
    }
    .dropdown.show { display: block; animation: fadeIn 0.15s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .dropdown a {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 6px;
      font-size: 0.83rem; color: var(--muted); cursor: pointer; text-decoration: none;
      transition: all 0.15s;
    }
    .dropdown a:hover { background: var(--coral-dim); color: var(--coral); }
    .dropdown a.quit:hover { background: rgba(224,85,85,0.12); color: var(--red); }

    /* Main */
    .main { position: relative; z-index: 1; padding: 0 36px 80px; max-width: 900px; margin: 0 auto; }

    .page-title {
      margin: 36px 0 24px;
      font-size: 1.4rem; font-weight: 700;
      display: flex; align-items: center; gap: 10px;
    }
    .page-title .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--coral); box-shadow: 0 0 10px rgba(255,107,91,0.25);
    }

    /* Order card */
    .order-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 12px;
      transition: border-color 0.3s, box-shadow 0.3s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .order-card:hover {
      border-color: var(--border-h);
      box-shadow: 0 8px 28px rgba(0,0,0,0.08);
    }

    .order-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .order-id {
      font-size: 0.78rem; color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .order-id em { font-style: normal; color: var(--coral); font-weight: 600; }

    .order-body {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 16px;
    }
    .order-goods-icon {
      width: 52px; height: 52px; border-radius: 10px;
      background: var(--coral-dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; color: var(--coral); flex-shrink: 0;
      border: 1px solid rgba(255,107,91,0.12);
    }
    .order-info { flex: 1; min-width: 0; }
    .order-goods-name {
      font-size: 0.95rem; font-weight: 600; margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .order-meta {
      font-size: 0.76rem; color: var(--muted);
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .order-amount {
      font-size: 1.2rem; font-weight: 700; color: var(--coral);
      white-space: nowrap;
    }

    .order-bottom {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .order-time {
      font-size: 0.74rem; color: var(--muted);
      display: flex; gap: 18px;
    }

    .order-actions { display: flex; gap: 10px; }

    /* Status badges */
    .badge {
      font-size: 0.72rem; font-weight: 700; padding: 4px 12px; border-radius: 20px;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .badge.unpaid {
      background: var(--gold-dim);
      border: 1px solid rgba(212,145,74,0.25);
      color: var(--gold);
    }
    .badge.unpaid .b-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold); animation: breathe 2s ease-in-out infinite;
    }
    .badge.paid {
      background: var(--green-dim);
      border: 1px solid rgba(107,165,135,0.25);
      color: #4A9070;
    }
    .badge.cancelled {
      background: rgba(0,0,0,0.03);
      border: 1px solid rgba(0,0,0,0.06);
      color: var(--muted);
    }

    /* Buttons */
    .btn {
      padding: 7px 18px; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
      border: none; cursor: pointer; font-family: inherit; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-pay {
      background: linear-gradient(135deg, rgba(255,107,91,0.15), rgba(255,142,83,0.08));
      border: 1px solid rgba(255,107,91,0.3); color: var(--coral);
    }
    .btn-pay:hover {
      background: linear-gradient(135deg, rgba(255,107,91,0.25), rgba(255,142,83,0.16));
      border-color: var(--coral); box-shadow: 0 0 14px rgba(255,107,91,0.15);
    }
    .btn-cancel {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-cancel:hover {
      border-color: rgba(224,69,69,0.35); color: var(--red);
      background: rgba(224,69,69,0.06);
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }

    /* Skeleton */
    .sk-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 24px; margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .sk-line {
      height: 14px; border-radius: 4px; background: rgba(0,0,0,0.04);
      animation: shimmer 1.8s infinite; margin-bottom: 10px;
    }
    .sk-line.w30 { width: 30%; }
    .sk-line.w50 { width: 50%; }
    .sk-line.w70 { width: 70%; }
    .sk-line.w90 { width: 90%; }
    @keyframes shimmer {
      0% { opacity: 0.4; } 50% { opacity: 0.8; } 100% { opacity: 0.4; }
    }

    /* Empty */
    .empty {
      text-align: center; padding: 80px 20px;
    }
    .empty .icon { font-size: 3.5rem; margin-bottom: 16px; opacity: 0.12; color: var(--muted); }
    .empty h3 { font-size: 1rem; margin-bottom: 6px; }
    .empty p { font-size: 0.85rem; color: var(--muted); margin-bottom: 20px; }
    .empty .btn-goto {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 22px; border-radius: 10px;
      background: linear-gradient(135deg, rgba(255,107,91,0.15), rgba(255,142,83,0.08));
      border: 1px solid rgba(255,107,91,0.3); color: var(--coral);
      font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: all 0.2s; text-decoration: none;
    }
    .empty .btn-goto:hover {
      border-color: var(--coral); box-shadow: 0 0 14px rgba(255,107,91,0.15);
      background: linear-gradient(135deg, rgba(255,107,91,0.25), rgba(255,142,83,0.16));
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--card-bg); border: 1px solid var(--border-h); border-radius: 12px;
      padding: 12px 22px; font-size: 0.86rem; font-weight: 500;
      box-shadow: 0 14px 36px rgba(0,0,0,0.12), 0 0 18px var(--coral-dim);
      transition: all 0.35s cubic-bezier(.4,0,.2,1);
      opacity: 0; z-index: 999; white-space: nowrap; display: flex; align-items: center; gap: 8px;
    }
    .toast.on { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Modal overlay */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--card-bg); border: 1px solid var(--border-h);
      border-radius: 16px; padding: 28px 32px; min-width: 340px;
      box-shadow: 0 24px 56px rgba(0,0,0,0.12);
    }
    .modal h3 { font-size: 1.05rem; margin-bottom: 18px; }
    .modal p { font-size: 0.88rem; color: var(--muted); margin-bottom: 22px; line-height: 1.6; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-modal-primary {
      padding: 8px 20px; border-radius: 8px; font-size: 0.84rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
      background: linear-gradient(135deg, rgba(255,107,91,0.15), rgba(255,142,83,0.08));
      border: 1px solid rgba(255,107,91,0.3); color: var(--coral);
    }
    .btn-modal-primary:hover {
      border-color: var(--coral); box-shadow: 0 0 14px rgba(255,107,91,0.15);
    }
    .btn-modal-secondary {
      padding: 8px 20px; border-radius: 8px; font-size: 0.84rem; font-weight: 500;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); cursor: pointer; font-family: inherit;
    }
    .btn-modal-secondary:hover { border-color: var(--border-h); color: var(--text); }

    /* Spinner */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,107,91,0.2);
      border-top-color: var(--coral);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .foot {
      border-top: 1px solid var(--border); padding: 22px 36px;
      display: flex; justify-content: space-between; color: var(--muted); font-size: 0.78rem;
      position: relative; z-index: 1;
    }

    @media (max-width: 640px) {
      .nav { padding: 0 16px; } .nav-links { gap: 0; }
      .nav-link { padding: 6px 8px; font-size: 0.76rem; }
      .main { padding: 0 16px 60px; }
      .order-body { flex-direction: column; align-items: flex-start; gap: 10px; }
      .order-bottom { flex-direction: column; gap: 10px; }
      .foot { flex-direction: column; gap: 6px; }
    }
  </style>
</head>
<body>

<div class="bg-base"></div>
<div id="cursor-warm"></div>

<nav class="nav">
  <div class="nav-brand" onclick="window.location.href='home.html'"><span class="dot"></span>SeckillPro</div>
  <div class="nav-links">
    <a class="nav-link" href="home.html">秒杀大厅</a>
    <a class="nav-link" href="admin.html">活动管理</a>
    <a class="nav-link" href="cache-stats.html">缓存监控</a>
    <a class="nav-link on">我的订单</a>
    <a class="nav-link" href="user.html">个人中心</a>
  </div>
  <div class="nav-right">
    <div class="nav-user" id="navUser" onclick="toggleDropdown()">
      <div class="nav-avatar" id="navAvatar">U</div>
      <span class="nav-name" id="navName">用户</span>
      <div class="dropdown" id="dropdown">
        <a href="cache-stats.html">缓存监控</a>
        <a href="user.html">个人中心</a>
        <a onclick="logout()" class="quit">退出登录</a>
      </div>
    </div>
  </div>
</nav>

<div class="main">
  <div class="page-title"><span class="dot"></span>我的订单</div>
  <div id="orderList"></div>
</div>

<footer class="foot">
  <span>&copy; 2026 SeckillPro</span>
  <span>仅供学习演示</span>
</footer>

<div class="toast" id="toast"><span id="toastMsg"></span></div>
<div class="modal-overlay hidden" id="confirmModal">
  <div class="modal">
    <h3 id="modalTitle">确认操作</h3>
    <p id="modalMsg"></p>
    <div class="modal-actions">
      <button class="btn-modal-secondary" onclick="closeModal()">再想想</button>
      <button class="btn-modal-primary" id="modalConfirmBtn">确认</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8028';

/* Auth check */
const userInfo = JSON.parse(sessionStorage.getItem('userInfo') || 'null');
if (!userInfo) window.location.href = 'index.html';

(function() {
  if (!userInfo) return;
  const name = userInfo.nickname || userInfo.phone || '用户';
  document.getElementById('navName').textContent = name;
  document.getElementById('navAvatar').textContent = name.charAt(0).toUpperCase();
})();

/* Cursor glow */
const glow = document.getElementById('cursor-warm');
document.addEventListener('mousemove', e => {
  glow.style.left = e.clientX + 'px';
  glow.style.top  = e.clientY + 'px';
});

/* Dropdown */
function toggleDropdown() {
  document.getElementById('dropdown').classList.toggle('show');
}
document.addEventListener('click', e => {
  if (!document.getElementById('navUser').contains(e.target))
    document.getElementById('dropdown').classList.remove('show');
});
function logout() {
  sessionStorage.removeItem('userInfo');
  window.location.href = 'index.html';
}

/* Toast */
let toastT;
function toast(msg, icon) {
  clearTimeout(toastT);
  document.getElementById('toastMsg').textContent = (icon || '') + ' ' + msg;
  const el = document.getElementById('toast');
  el.classList.add('on');
  toastT = setTimeout(() => el.classList.remove('on'), 2600);
}

/* Modal */
let modalCallback = null;
function showModal(title, msg, onConfirm) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMsg').textContent = msg;
  document.getElementById('confirmModal').classList.remove('hidden');
  modalCallback = onConfirm;
  document.getElementById('modalConfirmBtn').focus();
}
function closeModal() {
  document.getElementById('confirmModal').classList.add('hidden');
  modalCallback = null;
}
document.getElementById('modalConfirmBtn').addEventListener('click', async () => {
  if (modalCallback) await modalCallback();
  closeModal();
});
document.getElementById('confirmModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

/* Format helpers */
function fmtDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

const STATUS_MAP = {
  0: { cls: 'unpaid', text: '待支付' },
  1: { cls: 'paid', text: '已支付' },
  2: { cls: 'cancelled', text: '已取消' }
};

/* Skeleton */
function showSkeletons() {
  const container = document.getElementById('orderList');
  container.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const sk = document.createElement('div'); sk.className = 'sk-card';
    sk.innerHTML = '<div class="sk-line w30"></div><div class="sk-line w70"></div><div class="sk-line w50"></div><div class="sk-line w90"></div>';
    container.appendChild(sk);
  }
}

/* Render */
function renderOrders(orders) {
  const container = document.getElementById('orderList');

  if (!orders || orders.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="icon">◆</div>
        <h3>暂无订单</h3>
        <p>去秒杀大厅抢购心仪的商品吧</p>
        <a class="btn-goto" href="home.html">去秒杀大厅</a>
      </div>`;
    return;
  }

  container.innerHTML = orders.map(o => {
    const st = STATUS_MAP[o.status] || { cls: 'cancelled', text: '未知' };
    const isUnpaid = o.status === 0;

    return `
      <div class="order-card" data-id="${o.orderId}">
        <div class="order-top">
          <div class="order-id">订单号 <em>#${o.orderId}</em></div>
          <span class="badge ${st.cls}"><span class="b-dot"></span>${st.text}</span>
        </div>
        <div class="order-body">
          <div class="order-goods-icon">◆</div>
          <div class="order-info">
            <div class="order-goods-name">${escHtml(o.goodsName || '商品')}</div>
            <div class="order-meta">
              <span>数量: ${o.goodsCount || 1}</span>
              <span>单价: &yen;${(o.goodsPrice || 0).toLocaleString()}</span>
            </div>
          </div>
          <div class="order-amount">&yen;${(o.orderAmount || 0).toLocaleString()}</div>
        </div>
        <div class="order-bottom">
          <div class="order-time">
            <span>创建: ${fmtDate(o.createTime)}</span>
            ${o.payTime ? `<span>支付: ${fmtDate(o.payTime)}</span>` : ''}
          </div>
          ${isUnpaid ? `
            <div class="order-actions">
              <button class="btn btn-cancel" onclick="cancelOrder(${o.orderId})">取消订单</button>
              <button class="btn btn-pay" onclick="payOrder(${o.orderId})">立即支付</button>
            </div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function escHtml(s) {
  const el = document.createElement('span');
  el.textContent = s || '';
  return el.innerHTML;
}

/* Load */
async function loadOrders() {
  showSkeletons();
  try {
    const token = userInfo?.token || '';
    const res = await fetch(`${API}/api/order/list`, {
      headers: { 'Authorization': token }
    });
    const data = await res.json();
    if (data.code === '00000') {
      renderOrders(data.data);
    } else if (data.code === 'A00002') {
      sessionStorage.removeItem('userInfo');
      window.location.href = 'index.html';
    } else {
      document.getElementById('orderList').innerHTML = `<div class="empty"><div class="icon">◆</div><h3>加载失败</h3><p>${escHtml(data.msg || '请稍后重试')}</p></div>`;
    }
  } catch (e) {
    document.getElementById('orderList').innerHTML = '<div class="empty"><div class="icon">◆</div><h3>网络异常</h3><p>请检查后端服务是否启动</p></div>';
  }
}

/* Pay */
async function payOrder(orderId) {
  showModal('确认支付', `确定要支付订单 #${orderId} 吗？`, async () => {
    try {
      const res = await fetch(`${API}/api/order/pay/${orderId}`, {
        method: 'POST',
        headers: { 'Authorization': userInfo?.token || '' }
      });
      const data = await res.json();
      if (data.code === '00000') {
        toast('支付成功', '');
        loadOrders();
      } else {
        toast(data.msg || '支付失败', '');
      }
    } catch (e) {
      toast('网络异常，请稍后重试', '');
    }
  });
}

/* Cancel */
async function cancelOrder(orderId) {
  showModal('取消订单', `确定要取消订单 #${orderId} 吗？取消后不可恢复。`, async () => {
    try {
      const res = await fetch(`${API}/api/order/cancel/${orderId}`, {
        method: 'POST',
        headers: { 'Authorization': userInfo?.token || '' }
      });
      const data = await res.json();
      if (data.code === '00000') {
        toast('订单已取消', '');
        loadOrders();
      } else {
        toast(data.msg || '取消失败', '');
      }
    } catch (e) {
      toast('网络异常，请稍后重试', '');
    }
  });
}

loadOrders();
</script>
