<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>秒杀平台</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:        #00D4FF;
      --cyan-dim:    rgba(0, 212, 255, 0.15);
      --cyan-glow:   rgba(0, 212, 255, 0.35);
      --gold:        #FFB800;
      --gold-dim:    rgba(255, 184, 0, 0.15);
      --purple:      #7C3AED;
      --purple-dim:  rgba(124, 58, 237, 0.2);
      --bg:          #04050f;
      --bg2:         #080c1a;
      --surface:     rgba(255, 255, 255, 0.04);
      --surface-h:   rgba(0, 212, 255, 0.06);
      --border:      rgba(0, 212, 255, 0.12);
      --border-h:    rgba(0, 212, 255, 0.3);
      --text:        #E8F4FF;
      --muted:       rgba(232, 244, 255, 0.45);
      --input-bg:    rgba(0, 212, 255, 0.04);
      --input-border:rgba(0, 212, 255, 0.18);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── 粒子画布 ── */
    #canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── 鼠标光晕 ── */
    #cursor-glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(0,212,255,0.07) 0%,
        rgba(124,58,237,0.04) 40%,
        transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: left 0.12s ease, top 0.12s ease;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      display: flex;
      width: 100%;
      max-width: 920px;
      min-height: 560px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px var(--border),
        0 40px 80px rgba(0, 0, 0, 0.7),
        0 0 60px rgba(0, 212, 255, 0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    /* ── 品牌侧 ── */
    .brand {
      flex: 1;
      background: linear-gradient(160deg,
        rgba(0,212,255,0.08) 0%,
        rgba(124,58,237,0.06) 50%,
        rgba(4,5,15,0.95) 100%);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 52px 44px;
      position: relative;
      overflow: hidden;
    }

    .brand::before {
      content: '';
      position: absolute;
      width: 360px;
      height: 360px;
      background: radial-gradient(circle, rgba(0,212,255,0.1), transparent 65%);
      top: -100px;
      right: -100px;
      border-radius: 50%;
      pointer-events: none;
    }

    .brand::after {
      content: '';
      position: absolute;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(124,58,237,0.12), transparent 65%);
      bottom: -60px;
      left: -40px;
      border-radius: 50%;
      pointer-events: none;
    }

    .brand-logo {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-logo svg {
      width: 20px;
      height: 20px;
      fill: var(--cyan);
      filter: drop-shadow(0 0 6px var(--cyan));
    }

    .brand-title {
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .brand-title span {
      background: linear-gradient(90deg, var(--cyan), #00a8cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-sub {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 44px;
    }

    /* 装饰卡片 */
    .deco-cards { display: flex; flex-direction: column; gap: 10px; }

    .deco-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: floatCard 4s ease-in-out infinite;
      transition: border-color 0.3s;
    }

    .deco-card:nth-child(2) { animation-delay: 1.3s; }
    .deco-card:nth-child(3) { animation-delay: 2.6s; }

    .deco-card:hover { border-color: var(--border-h); }

    @keyframes floatCard {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .deco-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .deco-icon.cyan   { background: var(--cyan-dim); border: 1px solid rgba(0,212,255,0.2); }
    .deco-icon.gold   { background: var(--gold-dim); border: 1px solid rgba(255,184,0,0.2); }
    .deco-icon.purple { background: var(--purple-dim); border: 1px solid rgba(124,58,237,0.25); }

    .deco-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
    .deco-name { font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .deco-val  { font-size: 0.72rem; color: var(--muted); margin-top: 2px; font-variant-numeric: tabular-nums; }

    .deco-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      background: linear-gradient(90deg, var(--gold), #ff9500);
      color: #000;
      flex-shrink: 0;
    }

    /* ── 表单侧 ── */
    .form-panel {
      width: 380px;
      flex-shrink: 0;
      background: rgba(4, 5, 15, 0.92);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 40px;
    }

    .form-header { margin-bottom: 30px; }

    .form-header h2 {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .form-header p {
      font-size: 0.87rem;
      color: var(--muted);
    }

    /* ── 标签 ── */
    .tabs {
      display: flex;
      background: rgba(0,212,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 26px;
      position: relative;
    }

    .tab-slider {
      position: absolute;
      top: 4px;
      left: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      background: linear-gradient(90deg, rgba(0,212,255,0.2), rgba(0,212,255,0.12));
      border: 1px solid rgba(0,212,255,0.35);
      border-radius: 9px;
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 16px rgba(0,212,255,0.15), inset 0 0 8px rgba(0,212,255,0.05);
    }

    .tab-slider.register { transform: translateX(100%); }

    .tab-btn {
      flex: 1;
      position: relative;
      z-index: 1;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 600;
      padding: 10px 0;
      cursor: pointer;
      transition: color 0.25s;
      font-family: inherit;
    }

    .tab-btn.active { color: var(--cyan); }

    /* ── 表单 ── */
    .form { display: flex; flex-direction: column; gap: 16px; }

    .input-group { position: relative; }

    .input-group label {
      display: block;
      font-size: 0.76rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .input-wrap { position: relative; }

    .input-wrap input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      padding: 13px 44px 13px 42px;
      color: var(--text);
      font-size: 0.93rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .input-wrap input::placeholder { color: rgba(232,244,255,0.2); }

    .input-wrap input:focus {
      border-color: var(--cyan);
      background: rgba(0,212,255,0.06);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1), 0 0 16px rgba(0,212,255,0.08);
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      display: flex;
      align-items: center;
      pointer-events: none;
      transition: color 0.2s;
    }

    .input-icon svg { width: 16px; height: 16px; }
    .input-wrap:focus-within .input-icon { color: var(--cyan); }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .eye-btn:hover { color: var(--cyan); }
    .eye-btn svg { width: 16px; height: 16px; }

    /* ── 提交按钮 ── */
    .btn-submit {
      position: relative;
      overflow: hidden;
      width: 100%;
      padding: 14px;
      border: 1px solid rgba(0,212,255,0.4);
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(0,212,255,0.18), rgba(0,168,204,0.12));
      color: var(--cyan);
      font-size: 0.97rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
      letter-spacing: 0.5px;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s, border-color 0.2s;
      box-shadow: 0 0 20px rgba(0,212,255,0.1), inset 0 0 20px rgba(0,212,255,0.03);
    }

    .btn-submit:hover {
      background: linear-gradient(135deg, rgba(0,212,255,0.28), rgba(0,168,204,0.2));
      border-color: var(--cyan);
      box-shadow: 0 0 30px rgba(0,212,255,0.25), 0 4px 20px rgba(0,0,0,0.3);
      transform: translateY(-1px);
    }

    .btn-submit:active { transform: translateY(0); }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* 冲击波 ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(0,212,255,0.25);
      transform: scale(0);
      animation: rippleAnim 0.6s linear;
      pointer-events: none;
    }

    @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

    /* ── 提示 ── */
    .form-footer {
      text-align: center;
      margin-top: 18px;
      font-size: 0.83rem;
      color: var(--muted);
    }

    .form-footer a {
      color: var(--cyan);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .form-footer a:hover { opacity: 0.75; }

    /* ── Alert ── */
    .alert {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 0.84rem;
      font-weight: 500;
      animation: slideDown 0.22s ease;
      margin-bottom: 14px;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .alert.error {
      display: flex;
      background: rgba(255,60,60,0.1);
      border: 1px solid rgba(255,60,60,0.25);
      color: #ff8080;
    }

    .alert.success {
      display: flex;
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.25);
      color: var(--cyan);
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15%      { transform: translateX(-7px); }
      30%      { transform: translateX(7px); }
      45%      { transform: translateX(-5px); }
      60%      { transform: translateX(5px); }
      75%      { transform: translateX(-3px); }
      90%      { transform: translateX(3px); }
    }

    .shake { animation: shake 0.5s ease; }

    .form-pane.hidden { display: none; }

    .spinner {
      display: inline-block;
      width: 15px;
      height: 15px;
      border: 2px solid rgba(0,212,255,0.3);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 680px) {
      .brand { display: none; }
      .form-panel { width: 100%; }
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="cursor-glow"></div>

<div class="page">
  <div class="container" id="mainCard">

    <!-- 品牌侧 -->
    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        SeckillPro
      </div>
      <h1 class="brand-title">限时抢购<br><span>速度为王</span></h1>
      <p class="brand-sub">
        海量商品，极速秒杀<br>
        注册即享专属优先购权益
      </p>
      <div class="deco-cards">
        <div class="deco-card">
          <div class="deco-icon cyan">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#00D4FF" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M8 10h8M8 14h5"/></svg>
          </div>
          <div class="deco-info">
            <span class="deco-name">Switch OLED</span>
            <span class="deco-val">距开抢 <span class="deco-timer" data-sec="755">12:35</span></span>
          </div>
          <span class="deco-badge">-60%</span>
        </div>
        <div class="deco-card">
          <div class="deco-icon gold">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#FFB800" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="3"/><circle cx="12" cy="17" r="1"/></svg>
          </div>
          <div class="deco-info">
            <span class="deco-name">iPhone 16 Pro</span>
            <span class="deco-val">距开抢 <span class="deco-timer" data-sec="3920">01:05:20</span></span>
          </div>
          <span class="deco-badge">-30%</span>
        </div>
        <div class="deco-card">
          <div class="deco-icon purple">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#a78bfa" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          </div>
          <div class="deco-info">
            <span class="deco-name">AirPods Pro</span>
            <span class="deco-val">距开抢 <span class="deco-timer" data-sec="9000">02:30:00</span></span>
          </div>
          <span class="deco-badge">-45%</span>
        </div>
      </div>
    </div>

    <!-- 表单侧 -->
    <div class="form-panel">
      <div class="form-header">
        <h2 id="formTitle">欢迎回来</h2>
        <p>登录或注册，开启你的抢购之旅</p>
      </div>

      <div class="tabs">
        <div class="tab-slider" id="tabSlider"></div>
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">登 录</button>
        <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">注 册</button>
      </div>

      <div class="alert" id="alertBox">
        <span id="alertIcon"></span>
        <span id="alertMsg"></span>
      </div>

      <!-- 登录 -->
      <div class="form-pane" id="paneLogin">
        <div class="form">
          <div class="input-group">
            <label for="loginPhone">手机号</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="3"/><circle cx="12" cy="17" r="1"/></svg>
              </span>
              <input type="tel" id="loginPhone" placeholder="请输入手机号" maxlength="11" autocomplete="tel" />
            </div>
          </div>
          <div class="input-group">
            <label for="loginPwd">密码</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="loginPwd" placeholder="请输入密码" autocomplete="current-password" />
              <button class="eye-btn" onclick="togglePwd('loginPwd', this)" type="button" aria-label="显示/隐藏密码">
                <svg id="eyeLogin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button class="btn-submit" id="btnLogin" onclick="doLogin()">立即登录</button>
        </div>
        <div class="form-footer">还没有账号？<a onclick="switchTab('register')">去注册</a></div>
      </div>

      <!-- 注册 -->
      <div class="form-pane hidden" id="paneRegister">
        <div class="form">
          <div class="input-group">
            <label for="regPhone">手机号</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="3"/><circle cx="12" cy="17" r="1"/></svg>
              </span>
              <input type="tel" id="regPhone" placeholder="请输入手机号" maxlength="11" autocomplete="tel" />
            </div>
          </div>
          <div class="input-group">
            <label for="regPwd">密码</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="regPwd" placeholder="请设置密码（6位以上）" autocomplete="new-password" />
              <button class="eye-btn" onclick="togglePwd('regPwd', this)" type="button" aria-label="显示/隐藏密码">
                <svg id="eyeReg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button class="btn-submit" id="btnRegister" onclick="doRegister()">立即注册</button>
        </div>
        <div class="form-footer">已有账号？<a onclick="switchTab('login')">去登录</a></div>
      </div>
    </div>
  </div>
</div>

<script>
const API_BASE = 'http://localhost:8028';

/* ── 鼠标光晕 ── */
const glow = document.getElementById('cursor-glow');
document.addEventListener('mousemove', e => {
  glow.style.left = e.clientX + 'px';
  glow.style.top  = e.clientY + 'px';
});

/* ── 粒子背景（青色系） ── */
(function () {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], mouse = { x: -999, y: -999 };

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

  function Particle() { this.reset(true); }

  Particle.prototype.reset = function (init) {
    this.x  = Math.random() * W;
    this.y  = init ? Math.random() * H : (Math.random() < 0.5 ? -4 : H + 4);
    this.r  = Math.random() * 1.5 + 0.3;
    this.alpha = Math.random() * 0.5 + 0.1;
    this.vx = (Math.random() - 0.5) * 0.25;
    this.vy = (Math.random() - 0.5) * 0.25;
    this.hue = Math.random() < 0.6 ? 190 : (Math.random() < 0.5 ? 260 : 42);
  };

  Particle.prototype.update = function () {
    const dx = mouse.x - this.x, dy = mouse.y - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 140) {
      const f = (140 - dist) / 140;
      this.vx -= (dx / dist) * f * 0.35;
      this.vy -= (dy / dist) * f * 0.35;
    }
    this.vx *= 0.97; this.vy *= 0.97;
    this.x += this.vx; this.y += this.vy;
    if (this.x < -10 || this.x > W + 10 || this.y < -10 || this.y > H + 10) this.reset(false);
  };

  function init() { resize(); particles = Array.from({ length: 80 }, () => new Particle()); }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < particles.length; i++) {
      particles[i].update();
      const p = particles[i];
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue},100%,70%,${p.alpha})`;
      ctx.fill();
    }
    /* 连线 */
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d < 90) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(0,212,255,${0.1 * (1 - d / 90)})`;
          ctx.lineWidth = 0.5;
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  init(); draw();
})();

/* ── Ripple ── */
document.querySelectorAll('.btn-submit').forEach(btn => {
  btn.addEventListener('click', function (e) {
    const rect = this.getBoundingClientRect();
    const rpl  = document.createElement('span');
    rpl.className = 'ripple';
    const size = Math.max(rect.width, rect.height);
    rpl.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    this.appendChild(rpl);
    setTimeout(() => rpl.remove(), 650);
  });
});

/* ── 装饰卡片倒计时 ── */
setInterval(() => {
  document.querySelectorAll('.deco-timer').forEach(el => {
    let s = parseInt(el.dataset.sec, 10);
    if (s > 0) { s--; el.dataset.sec = s; }
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
    el.textContent = s >= 3600
      ? `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
      : `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  });
}, 1000);

/* ── Tab 切换 ── */
let currentTab = 'login';

function switchTab(tab) {
  if (tab === currentTab) return;
  currentTab = tab;
  hideAlert();
  const slider = document.getElementById('tabSlider');
  const pLogin = document.getElementById('paneLogin');
  const pReg   = document.getElementById('paneRegister');
  if (tab === 'login') {
    slider.classList.remove('register');
    document.getElementById('tabLogin').classList.add('active');
    document.getElementById('tabRegister').classList.remove('active');
    pReg.classList.add('hidden'); pLogin.classList.remove('hidden');
    document.getElementById('formTitle').textContent = '欢迎回来';
  } else {
    slider.classList.add('register');
    document.getElementById('tabRegister').classList.add('active');
    document.getElementById('tabLogin').classList.remove('active');
    pLogin.classList.add('hidden'); pReg.classList.remove('hidden');
    document.getElementById('formTitle').textContent = '创建账号';
  }
}

/* ── 显示/隐藏密码 ── */
function togglePwd(inputId, btn) {
  const inp = document.getElementById(inputId);
  const eyeId = inputId === 'loginPwd' ? 'eyeLogin' : 'eyeReg';
  if (inp.type === 'password') {
    inp.type = 'text';
    document.getElementById(eyeId).innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    document.getElementById(eyeId).innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

/* ── Alert ── */
function showAlert(msg, type) {
  const box  = document.getElementById('alertBox');
  const icon = document.getElementById('alertIcon');
  const msgEl = document.getElementById('alertMsg');
  box.className = 'alert ' + type;
  icon.innerHTML = type === 'error'
    ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
    : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
  msgEl.textContent = msg;
}

function hideAlert() {
  document.getElementById('alertBox').className = 'alert';
}

function shakeCard() {
  const card = document.getElementById('mainCard');
  card.classList.remove('shake');
  void card.offsetWidth;
  card.classList.add('shake');
  card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
}

function setLoading(btnId, loading, text) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading ? `<span class="spinner"></span>${text}` : text;
}

/* ── 登录 ── */
async function doLogin() {
  const phone = document.getElementById('loginPhone').value.trim();
  const pwd   = document.getElementById('loginPwd').value.trim();
  if (!phone || !pwd) { showAlert('请填写手机号和密码', 'error'); shakeCard(); return; }
  if (!/^1[3-9]\d{9}$/.test(phone)) { showAlert('请输入正确的手机号', 'error'); shakeCard(); return; }
  setLoading('btnLogin', true, '登录中...');
  hideAlert();
  try {
    const res  = await fetch(`${API_BASE}/api/user/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, password: pwd })
    });
    const data = await res.json();
    if (data.code === '00000') {
      showAlert('登录成功，正在跳转...', 'success');
      sessionStorage.setItem('userInfo', JSON.stringify(data.data));
      setTimeout(() => { window.location.href = 'home.html'; }, 1200);
    } else {
      showAlert(data.msg || '手机号或密码错误', 'error'); shakeCard();
    }
  } catch (e) {
    showAlert('网络异常，请稍后重试', 'error'); shakeCard();
  } finally {
    setLoading('btnLogin', false, '立即登录');
  }
}

/* ── 注册 ── */
async function doRegister() {
  const phone = document.getElementById('regPhone').value.trim();
  const pwd   = document.getElementById('regPwd').value.trim();
  if (!phone || !pwd) { showAlert('请填写手机号和密码', 'error'); shakeCard(); return; }
  if (!/^1[3-9]\d{9}$/.test(phone)) { showAlert('请输入正确的手机号', 'error'); shakeCard(); return; }
  if (pwd.length < 6) { showAlert('密码长度不能少于6位', 'error'); shakeCard(); return; }
  setLoading('btnRegister', true, '注册中...');
  hideAlert();
  try {
    const res  = await fetch(`${API_BASE}/api/user/register`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, password: pwd })
    });
    const data = await res.json();
    if (data.code === '00000') {
      showAlert('注册成功！请登录', 'success');
      document.getElementById('regPhone').value = '';
      document.getElementById('regPwd').value   = '';
      setTimeout(() => switchTab('login'), 1200);
    } else {
      showAlert(data.msg || '注册失败，请重试', 'error'); shakeCard();
    }
  } catch (e) {
    showAlert('网络异常，请稍后重试', 'error'); shakeCard();
  } finally {
    setLoading('btnRegister', false, '立即注册');
  }
}

/* ── 回车提交 ── */
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (currentTab === 'login') doLogin(); else doRegister();
});
</script>
