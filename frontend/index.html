<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>秒杀平台</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #FFF8F0;
      --card-bg:   #FFFFFF;
      --text:      #3D2E1F;
      --muted:     #9B8573;
      --coral:     #FF6B5B;
      --coral-dim: rgba(255,107,91,0.1);
      --gold:      #D4914A;
      --gold-light:#E8A850;
      --gold-dim:  rgba(212,145,74,0.1);
      --green:     #6BA587;
      --green2:    #5CA890;
      --red:       #E04545;
      --red-dim:   rgba(224,69,69,0.08);
      --surface:   rgba(0,0,0,0.02);
      --border:    rgba(0,0,0,0.06);
      --border-h:  rgba(0,0,0,0.14);
      --input-bg:  rgba(0,0,0,0.02);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .bg-base {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(255,180,130,0.12) 0%, transparent 50%),
        radial-gradient(ellipse 60% 80% at 80% 60%, rgba(255,150,100,0.08) 0%, transparent 50%),
        radial-gradient(ellipse 50% 50% at 40% 80%, rgba(107,165,135,0.05) 0%, transparent 50%);
    }

    /* Floating petals */
    .petals {
      position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
    }
    .petal {
      position: absolute; bottom: -30px;
      width: 10px; height: 14px; border-radius: 50% 0 50% 0;
      background: rgba(255,180,150,0.35);
      animation: petalFloat linear infinite;
    }
    .petal:nth-child(2n) { background: rgba(255,200,170,0.3); border-radius: 0 50% 0 50%; }
    .petal:nth-child(3n) { background: rgba(107,165,135,0.2); width: 8px; height: 11px; }
    .petal:nth-child(4n) { background: rgba(255,150,120,0.25); }
    @keyframes petalFloat {
      0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-105vh) translateX(60px) rotate(360deg); opacity: 0; }
    }

    .page {
      position: relative; z-index: 2;
      display: flex; height: 100vh; align-items: center; justify-content: center;
      padding: 24px;
    }

    .container {
      display: flex; width: 100%; max-width: 960px; min-height: 580px;
      border-radius: 24px; overflow: hidden;
      box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,0.08);
      background: var(--card-bg);
    }

    /* ── 植物角色区 ── */
    .plants-area {
      flex: 1;
      background: linear-gradient(170deg,
        rgba(255,248,240,0.98) 0%,
        rgba(255,240,228,0.96) 40%,
        rgba(245,235,220,0.98) 100%);
      border-right: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      gap: 20px; padding: 40px 30px; position: relative; overflow: hidden;
      cursor: default;
    }

    /* ground shadow */
    .plants-area::after {
      content: '';
      position: absolute; bottom: 20px; left: 15%; width: 70%; height: 6px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.06) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .plant-wrapper {
      width: 150px; flex-shrink: 0;
      transition: transform 0.25s ease-out;
      transform-origin: bottom center;
    }

    .plant-wrapper svg { display: block; width: 100%; height: auto; }

    /* 眼睛瞳孔 */
    .pupil { transition: cx 0.12s ease-out, cy 0.12s ease-out; }

    /* ── 表单侧 ── */
    .form-panel {
      width: 380px; flex-shrink: 0;
      background: var(--card-bg);
      display: flex; flex-direction: column; justify-content: center;
      padding: 48px 40px;
    }

    .form-header { margin-bottom: 30px; }
    .form-header h2 {
      font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.3px;
    }
    .form-header p { font-size: 0.87rem; color: var(--muted); }

    /* Tabs */
    .tabs {
      display: flex; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 4px; margin-bottom: 26px; position: relative;
    }
    .tab-slider {
      position: absolute; top: 4px; left: 4px;
      width: calc(50% - 4px); height: calc(100% - 8px);
      background: linear-gradient(135deg, rgba(255,107,91,0.15), rgba(255,142,83,0.08));
      border: 1px solid rgba(255,107,91,0.3); border-radius: 9px;
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    }
    .tab-slider.register { transform: translateX(100%); }
    .tab-btn {
      flex: 1; position: relative; z-index: 1;
      background: none; border: none; color: var(--muted);
      font-size: 0.88rem; font-weight: 600; padding: 10px 0;
      cursor: pointer; transition: color 0.25s; font-family: inherit;
    }
    .tab-btn.active { color: var(--coral); }

    /* Form */
    .form { display: flex; flex-direction: column; gap: 16px; }

    .input-group { position: relative; }
    .input-group label {
      display: block; font-size: 0.76rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%; background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 13px 44px 13px 42px;
      color: var(--text); font-size: 0.93rem; font-family: inherit; outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .input-wrap input::placeholder { color: rgba(0,0,0,0.2); }
    .input-wrap input:focus {
      border-color: var(--coral); background: var(--card-bg);
      box-shadow: 0 0 0 3px var(--coral-dim), 0 0 16px var(--coral-dim);
    }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); display: flex; align-items: center; pointer-events: none;
      transition: color 0.2s;
    }
    .input-icon svg { width: 16px; height: 16px; }
    .input-wrap:focus-within .input-icon { color: var(--coral); }

    .eye-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      padding: 4px; display: flex; align-items: center; transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--coral); }
    .eye-btn svg { width: 16px; height: 16px; }

    /* Submit */
    .btn-submit {
      position: relative; overflow: hidden; width: 100%; padding: 14px;
      border: 1px solid rgba(255,107,91,0.35); border-radius: 12px;
      background: linear-gradient(135deg, rgba(255,107,91,0.15), rgba(255,142,83,0.08));
      color: var(--coral); font-size: 0.97rem; font-weight: 700;
      font-family: inherit; cursor: pointer; margin-top: 4px; letter-spacing: 0.5px;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s, border-color 0.2s;
    }
    .btn-submit:hover {
      background: linear-gradient(135deg, rgba(255,107,91,0.25), rgba(255,142,83,0.16));
      border-color: var(--coral);
      box-shadow: 0 0 20px rgba(255,107,91,0.12);
      transform: translateY(-1px);
    }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,107,91,0.2);
      transform: scale(0); animation: rippleAnim 0.6s linear; pointer-events: none;
    }
    @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

    .form-footer {
      text-align: center; margin-top: 18px; font-size: 0.83rem; color: var(--muted);
    }
    .form-footer a {
      color: var(--coral); text-decoration: none; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .form-footer a:hover { opacity: 0.75; }

    /* Alert */
    .alert {
      display: none; align-items: center; gap: 8px;
      padding: 11px 14px; border-radius: 10px; font-size: 0.84rem; font-weight: 500;
      animation: slideDown 0.22s ease; margin-bottom: 14px;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .alert.error {
      display: flex; background: var(--red-dim);
      border: 1px solid rgba(224,69,69,0.2); color: var(--red);
    }
    .alert.success {
      display: flex; background: rgba(107,165,135,0.1);
      border: 1px solid rgba(107,165,135,0.2); color: #4A9070;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15%      { transform: translateX(-7px); }
      30%      { transform: translateX(7px); }
      45%      { transform: translateX(-5px); }
      60%      { transform: translateX(5px); }
      75%      { transform: translateX(-3px); }
      90%      { transform: translateX(3px); }
    }
    .shake { animation: shake 0.5s ease; }
    .form-pane.hidden { display: none; }

    .spinner {
      display: inline-block; width: 15px; height: 15px;
      border: 2px solid rgba(255,107,91,0.2); border-top-color: var(--coral);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 680px) {
      .plants-area { display: none; }
      .form-panel { width: 100%; }
    }
  </style>
</head>
<body>

<div class="bg-base"></div>
<div class="petals" id="petals"></div>

<div class="page">
  <div class="container" id="mainCard">

    <!-- 植物角色区 -->
    <div class="plants-area" id="plantsArea">
      <!-- 角色 1：高个子 -->
      <div class="plant-wrapper" id="plant1">
        <svg viewBox="0 0 180 340" xmlns="http://www.w3.org/2000/svg">
          <!-- 叶子簇 -->
          <ellipse cx="65" cy="88" rx="42" ry="32" fill="#7BBFA0" transform="rotate(-12 65 88)"/>
          <ellipse cx="115" cy="85" rx="38" ry="30" fill="#5CA890" transform="rotate(10 115 85)"/>
          <ellipse cx="50" cy="72" rx="28" ry="22" fill="#6BA587"/>
          <ellipse cx="130" cy="75" rx="26" ry="20" fill="#8CC9A8"/>
          <ellipse cx="90" cy="60" rx="32" ry="26" fill="#6BA587"/>
          <!-- 茎 -->
          <rect x="86" y="90" width="8" height="36" rx="4" fill="#5CA890"/>
          <!-- 花盆 -->
          <path d="M45,120 L135,120 L122,230 L58,230 Z" fill="#D4914A"/>
          <rect x="38" y="110" width="104" height="14" rx="5" fill="#E8A850"/>
          <!-- 左眼 -->
          <ellipse cx="72" cy="158" rx="13" ry="14" fill="#fff"/>

          <!-- 嘴巴 -->
          <path id="p1Mouth" d="M78,182 Q90,194 102,182" fill="none" stroke="#3D2E1F" stroke-width="2.2" stroke-linecap="round"/>
          <!-- 腮红 -->
          <ellipse cx="58" cy="170" rx="7" ry="5" fill="rgba(255,107,91,0.25)"/>
          <ellipse cx="122" cy="170" rx="7" ry="5" fill="rgba(255,107,91,0.25)"/>
        </svg>
      </div>

      <!-- 角色 2：矮圆 -->
      <div class="plant-wrapper" id="plant2" style="width:135px;">
        <svg viewBox="0 0 160 310" xmlns="http://www.w3.org/2000/svg">
          <!-- 圆形叶子 -->
          <ellipse cx="60" cy="78" rx="36" ry="28" fill="#6BA587" transform="rotate(-8 60 78)"/>
          <ellipse cx="100" cy="80" rx="34" ry="26" fill="#7BBFA0" transform="rotate(8 100 80)"/>
          <ellipse cx="80" cy="55" rx="30" ry="24" fill="#5CA890"/>
          <ellipse cx="48" cy="90" rx="24" ry="18" fill="#8CC9A8"/>
          <ellipse cx="112" cy="88" rx="22" ry="17" fill="#6BA587"/>
          <!-- 小花 -->
          <circle cx="80" cy="28" r="7" fill="rgba(255,180,150,0.7)"/>
          <circle cx="76" cy="23" r="5" fill="rgba(255,200,170,0.6)"/>
          <circle cx="84" cy="23" r="5" fill="rgba(255,200,170,0.6)"/>
          <circle cx="80" cy="19" r="5" fill="rgba(255,220,190,0.6)"/>
          <circle cx="71" cy="28" r="4" fill="rgba(255,190,160,0.5)"/>
          <circle cx="89" cy="28" r="4" fill="rgba(255,190,160,0.5)"/>
          <!-- 茎 -->
          <rect x="76" y="80" width="8" height="30" rx="4" fill="#5CA890"/>
          <!-- 花盆（更圆） -->
          <path d="M42,105 L118,105 L108,210 L52,210 Z" fill="#D4914A"/>
          <rect x="36" y="96" width="88" height="12" rx="5" fill="#E8A850"/>
          <!-- 左眼 -->
          <ellipse cx="63" cy="142" rx="12" ry="13" fill="#fff"/>
          <circle cx="66" cy="142" r="5" fill="#3D2E1F" class="pupil" id="p2LeftPupil"/>
          <!-- 右眼 -->
          <ellipse cx="97" cy="142" rx="12" ry="13" fill="#fff"/>
          <circle cx="100" cy="142" r="5" fill="#3D2E1F" class="pupil" id="p2RightPupil"/>
          <!-- 嘴巴 -->
          <path id="p2Mouth" d="M68,164 Q80,176 92,164" fill="none" stroke="#3D2E1F" stroke-width="2.2" stroke-linecap="round"/>
          <!-- 腮红 -->
          <ellipse cx="50" cy="152" rx="6" ry="4.5" fill="rgba(255,107,91,0.25)"/>
          <ellipse cx="110" cy="152" rx="6" ry="4.5" fill="rgba(255,107,91,0.25)"/>
        </svg>
      </div>
    </div>

    <!-- 表单侧 -->
    <div class="form-panel">
      <div class="form-header">
        <h2 id="formTitle">欢迎回来</h2>
        <p>登录或注册，开启你的抢购之旅</p>
      </div>

      <div class="tabs">
        <div class="tab-slider" id="tabSlider"></div>
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">登 录</button>
        <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">注 册</button>
      </div>

      <div class="alert" id="alertBox">
        <span id="alertIcon"></span>
        <span id="alertMsg"></span>
      </div>

      <!-- 登录 -->
      <div class="form-pane" id="paneLogin">
        <div class="form">
          <div class="input-group">
            <label for="loginPhone">手机号</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="3"/><circle cx="12" cy="17" r="1"/></svg>
              </span>
              <input type="tel" id="loginPhone" placeholder="请输入手机号" maxlength="11" autocomplete="tel" />
            </div>
          </div>
          <div class="input-group">
            <label for="loginPwd">密码</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="loginPwd" placeholder="请输入密码" autocomplete="current-password" />
              <button class="eye-btn" onclick="togglePwd('loginPwd', this)" type="button">
                <svg id="eyeLogin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button class="btn-submit" id="btnLogin" onclick="doLogin()">立即登录</button>
        </div>
        <div class="form-footer">还没有账号？<a onclick="switchTab('register')">去注册</a></div>
      </div>

      <!-- 注册 -->
      <div class="form-pane hidden" id="paneRegister">
        <div class="form">
          <div class="input-group">
            <label for="regPhone">手机号</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="3"/><circle cx="12" cy="17" r="1"/></svg>
              </span>
              <input type="tel" id="regPhone" placeholder="请输入手机号" maxlength="11" autocomplete="tel" />
            </div>
          </div>
          <div class="input-group">
            <label for="regPwd">密码</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="regPwd" placeholder="请设置密码（6位以上）" autocomplete="new-password" />
              <button class="eye-btn" onclick="togglePwd('regPwd', this)" type="button">
                <svg id="eyeReg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button class="btn-submit" id="btnRegister" onclick="doRegister()">立即注册</button>
        </div>
        <div class="form-footer">已有账号？<a onclick="switchTab('login')">去登录</a></div>
      </div>
    </div>
  </div>
</div>

<script>
const API_BASE = 'http://localhost:8028';

/* ── 飘落花瓣 ── */
(function () {
  const container = document.getElementById('petals');
  for (let i = 0; i < 14; i++) {
    const petal = document.createElement('div');
    petal.className = 'petal';
    petal.style.left = Math.random() * 95 + '%';
    petal.style.animationDuration = (Math.random() * 10 + 10) + 's';
    petal.style.animationDelay = (Math.random() * 12) + 's';
    petal.style.width = (Math.random() * 8 + 6) + 'px';
    petal.style.height = (Math.random() * 12 + 8) + 'px';
    container.appendChild(petal);
  }
})();

/* ── 眼睛追踪 + 身体倾斜 ── */
(function () {
  const area = document.getElementById('plantsArea');
  const plant1 = document.getElementById('plant1');
  const plant2 = document.getElementById('plant2');

  // 每个角色的眼睛中心坐标 (SVG坐标系)
  const eyes = {
    p1: {
      left:  { cx: 72, cy: 158, id: 'p1LeftPupil' },
      right: { cx: 108, cy: 158, id: 'p1RightPupil' }
    },
    p2: {
      left:  { cx: 63, cy: 142, id: 'p2LeftPupil' },
      right: { cx: 97, cy: 142, id: 'p2RightPupil' }
    }
  };

  const maxPupilOffset = 4; // 瞳孔最大偏移量

  area.addEventListener('mousemove', function(e) {
    const rect = area.getBoundingClientRect();

    // 计算鼠标在区域内的相对位置 (0~1)
    const mx = (e.clientX - rect.left) / rect.width;   // 0=左, 1=右
    const my = (e.clientY - rect.top) / rect.height;   // 0=上, 1=下

    // 瞳孔偏移
    const dx = (mx - 0.5) * 2 * maxPupilOffset; // -max~+max
    const dy = (my - 0.5) * 2 * maxPupilOffset;

    // 更新所有瞳孔
    Object.values(eyes).forEach(plant => {
      Object.values(plant).forEach(eye => {
        const el = document.getElementById(eye.id);
        if (el) {
          el.setAttribute('cx', eye.cx + dx);
          el.setAttribute('cy', eye.cy + dy);
        }
      });
    });

    // 身体倾斜 (左右偏移，最大 ±4deg)
    const tilt = (mx - 0.5) * 8;
    plant1.style.transform = `rotate(${tilt}deg)`;
    // 角色2 略微延迟倾斜，产生层次感
    plant2.style.transform = `rotate(${tilt * 0.85}deg)`;
  });

  area.addEventListener('mouseleave', function() {
    // 复位
    Object.values(eyes).forEach(plant => {
      Object.values(plant).forEach(eye => {
        const el = document.getElementById(eye.id);
        if (el) {
          el.setAttribute('cx', eye.cx);
          el.setAttribute('cy', eye.cy);
        }
      });
    });
    plant1.style.transform = 'rotate(0deg)';
    plant2.style.transform = 'rotate(0deg)';
  });
})();

/* ── Ripple ── */
document.querySelectorAll('.btn-submit').forEach(btn => {
  btn.addEventListener('click', function (e) {
    const rect = this.getBoundingClientRect();
    const rpl  = document.createElement('span');
    rpl.className = 'ripple';
    const size = Math.max(rect.width, rect.height);
    rpl.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    this.appendChild(rpl);
    setTimeout(() => rpl.remove(), 650);
  });
});

/* ── Tab 切换（含表情） ── */
let currentTab = 'login';

function switchTab(tab) {
  if (tab === currentTab) return;
  currentTab = tab;
  hideAlert();
  const slider = document.getElementById('tabSlider');
  const pLogin = document.getElementById('paneLogin');
  const pReg   = document.getElementById('paneRegister');

  if (tab === 'login') {
    slider.classList.remove('register');
    document.getElementById('tabLogin').classList.add('active');
    document.getElementById('tabRegister').classList.remove('active');
    pReg.classList.add('hidden'); pLogin.classList.remove('hidden');
    document.getElementById('formTitle').textContent = '欢迎回来';
    // 微笑
    document.getElementById('p1Mouth').setAttribute('d', 'M78,182 Q90,194 102,182');
    document.getElementById('p2Mouth').setAttribute('d', 'M68,164 Q80,176 92,164');
  } else {
    slider.classList.add('register');
    document.getElementById('tabRegister').classList.add('active');
    document.getElementById('tabLogin').classList.remove('active');
    pLogin.classList.add('hidden'); pReg.classList.remove('hidden');
    document.getElementById('formTitle').textContent = '创建账号';
    // 惊讶张嘴 O 形
    document.getElementById('p1Mouth').setAttribute('d', 'M84,180 Q90,168 96,180');
    document.getElementById('p2Mouth').setAttribute('d', 'M74,162 Q80,152 86,162');
  }
}

/* ── 显示/隐藏密码 ── */
function togglePwd(inputId, btn) {
  const inp = document.getElementById(inputId);
  const eyeId = inputId === 'loginPwd' ? 'eyeLogin' : 'eyeReg';
  if (inp.type === 'password') {
    inp.type = 'text';
    document.getElementById(eyeId).innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    document.getElementById(eyeId).innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

/* ── Alert ── */
function showAlert(msg, type) {
  const box  = document.getElementById('alertBox');
  const icon = document.getElementById('alertIcon');
  const msgEl = document.getElementById('alertMsg');
  box.className = 'alert ' + type;
  icon.innerHTML = type === 'error'
    ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
    : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
  msgEl.textContent = msg;
}

function hideAlert() {
  document.getElementById('alertBox').className = 'alert';
}

function shakeCard() {
  const card = document.getElementById('mainCard');
  card.classList.remove('shake');
  void card.offsetWidth;
  card.classList.add('shake');
  card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
}

function setLoading(btnId, loading, text) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading ? `<span class="spinner"></span>${text}` : text;
}

/* ── 登录 ── */
async function doLogin() {
  const phone = document.getElementById('loginPhone').value.trim();
  const pwd   = document.getElementById('loginPwd').value.trim();
  if (!phone || !pwd) { showAlert('请填写手机号和密码', 'error'); shakeCard(); return; }
  if (!/^1[3-9]\d{9}$/.test(phone)) { showAlert('请输入正确的手机号', 'error'); shakeCard(); return; }
  setLoading('btnLogin', true, '登录中...');
  hideAlert();
  try {
    const res  = await fetch(`${API_BASE}/api/user/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, password: pwd })
    });
    const data = await res.json();
    if (data.code === '00000') {
      showAlert('登录成功，正在跳转...', 'success');
      sessionStorage.setItem('userInfo', JSON.stringify(data.data));
      setTimeout(() => { window.location.href = 'home.html'; }, 1200);
    } else {
      showAlert(data.msg || '手机号或密码错误', 'error'); shakeCard();
    }
  } catch (e) {
    showAlert('网络异常，请稍后重试', 'error'); shakeCard();
  } finally {
    setLoading('btnLogin', false, '立即登录');
  }
}

/* ── 注册 ── */
async function doRegister() {
  const phone = document.getElementById('regPhone').value.trim();
  const pwd   = document.getElementById('regPwd').value.trim();
  if (!phone || !pwd) { showAlert('请填写手机号和密码', 'error'); shakeCard(); return; }
  if (!/^1[3-9]\d{9}$/.test(phone)) { showAlert('请输入正确的手机号', 'error'); shakeCard(); return; }
  if (pwd.length < 6) { showAlert('密码长度不能少于6位', 'error'); shakeCard(); return; }
  setLoading('btnRegister', true, '注册中...');
  hideAlert();
  try {
    const res  = await fetch(`${API_BASE}/api/user/register`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, password: pwd })
    });
    const data = await res.json();
    if (data.code === '00000') {
      showAlert('注册成功！请登录', 'success');
      document.getElementById('regPhone').value = '';
      document.getElementById('regPwd').value   = '';
      setTimeout(() => switchTab('login'), 1200);
    } else {
      showAlert(data.msg || '注册失败，请重试', 'error'); shakeCard();
    }
  } catch (e) {
    showAlert('网络异常，请稍后重试', 'error'); shakeCard();
  } finally {
    setLoading('btnRegister', false, '立即注册');
  }
}

/* ── 回车提交 ── */
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (currentTab === 'login') doLogin(); else doRegister();
});
</script>
